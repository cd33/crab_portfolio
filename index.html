<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/crab.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to speed up third-party resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Preload critical resources -->
    <link rel="modulepreload" href="/src/main.tsx" />

    <title>CrabCorp by cd33</title>
    <meta
      name="description"
      content="Welcome to CrabCorp"
    />
    <meta
      name="keywords"
      content="Portfolio, 3D, Three.js, React, web developer, interactive projects"
    />
    <meta name="author" content="cd33" />
    <!-- PWA theme color -->
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CrabCorp by cd33" />
    <meta
      property="og:description"
      content="Welcome to CrabCorp"
    />
    <meta property="og:url" content="https://cd33.eu" />
    <meta property="og:image" content="https://cd33.eu/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CrabCorp by cd33" />
    <meta
      name="twitter:description"
      content="Welcome to CrabCorp"
    />
    <meta name="twitter:image" content="https://cd33.eu/og-image.png" />

    <!-- Inline Critical CSS for faster FCP -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .skeleton-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
      }
      .skeleton-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Skeleton loader visible pendant le chargement -->
    <div id="skeleton-loader" class="skeleton-loader">
      <div class="skeleton-spinner"></div>
    </div>

    <div id="root"></div>
    <noscript>
      <style>body { margin: 0; background: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }</style>
      <div>
        <h1>JavaScript requis / JavaScript required</h1>
        <p>Ce portfolio 3D interactif nécessite JavaScript pour fonctionner.<br>
        This interactive 3D portfolio requires JavaScript to run.</p>
        <a href="/fallback.html" style="color:#87CEEB">Voir la version HTML / View HTML version</a>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Supprimer le skeleton une fois React chargé -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const skeleton = document.getElementById('skeleton-loader');
          if (skeleton) skeleton.style.display = 'none';
        }, 100);
      });
    </script>
  </body>
</html>
